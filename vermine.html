<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>VERMINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bungee+Shade&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #0a0a0a;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  color: #e0e0e0;
}

#game-container {
  width: 100vw; height: 100vh;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

#game-area {
  position: relative;
  width: 800px;
  height: 500px;
  border: 1px solid #333;
  overflow: hidden;
  /* DECOR : MUR DE BRIQUES SALE */
  background-color: #2a1f1a;
  background-image:
    /* Briques pattern */
    linear-gradient(0deg, transparent 47%, rgba(0,0,0,0.4) 48%, rgba(0,0,0,0.4) 52%, transparent 53%),
    linear-gradient(90deg, transparent 24%, rgba(0,0,0,0.35) 25%, rgba(0,0,0,0.35) 26%, transparent 27%, transparent 49%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.35) 51%, transparent 52%, transparent 74%, rgba(0,0,0,0.35) 75%, rgba(0,0,0,0.35) 76%, transparent 77%);
  background-size: 80px 40px, 80px 40px;
}

/* Décrochages de briques (offset 1 ligne sur 2) */
#brick-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(90deg, transparent 24%, rgba(0,0,0,0.35) 25%, rgba(0,0,0,0.35) 26%, transparent 27%, transparent 49%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.35) 51%, transparent 52%, transparent 74%, rgba(0,0,0,0.35) 75%, rgba(0,0,0,0.35) 76%, transparent 77%);
  background-size: 80px 40px;
  background-position: 40px 20px;
  opacity: 0.6;
  mix-blend-mode: multiply;
}

/* Texture sale (taches sombres) */
#dirt-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 15% 30%, rgba(0,0,0,0.4) 0%, transparent 8%),
    radial-gradient(ellipse at 70% 20%, rgba(0,0,0,0.3) 0%, transparent 6%),
    radial-gradient(ellipse at 40% 60%, rgba(0,0,0,0.35) 0%, transparent 7%),
    radial-gradient(ellipse at 85% 75%, rgba(0,0,0,0.4) 0%, transparent 9%),
    radial-gradient(ellipse at 25% 85%, rgba(0,0,0,0.3) 0%, transparent 8%),
    radial-gradient(ellipse at 55% 40%, rgba(0,0,0,0.25) 0%, transparent 5%);
  opacity: 0.7;
}

/* Sol au bas */
.ground {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 30px;
  background: #1a1410;
  border-top: 2px solid #0a0808;
}

/* GRAFFITIS — STENCILS & DESSINS */
.graffiti-svg {
  position: absolute;
  pointer-events: none;
  user-select: none;
}

/* Effet "spray paint" : flou subtil + opacité non uniforme */
.graffiti-svg svg {
  filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.6)) drop-shadow(0 0 1px currentColor);
}

/* Petit texte tag (rare, juste 1-2) */
.graffiti-tag {
  position: absolute;
  pointer-events: none;
  user-select: none;
  font-family: 'Permanent Marker', cursive;
  font-weight: 900;
  text-shadow:
    -1px -1px 0 #000,
    2px 2px 0 #000,
    3px 3px 4px rgba(0,0,0,0.6);
}

/* Éclaboussures de spray */
.spray-dot {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

/* Poubelles */
.trash {
  position: absolute;
  pointer-events: none;
  width: 40px; height: 50px;
  bottom: 30px;
  background: #2a2520;
  border: 2px solid #0a0808;
  border-radius: 3px 3px 1px 1px;
}
.trash::before {
  content: '';
  position: absolute;
  top: -4px; left: -3px; right: -3px;
  height: 6px;
  background: #1a1510;
  border: 2px solid #0a0808;
  border-radius: 3px;
}
.trash::after {
  content: '';
  position: absolute;
  top: 12px; left: 6px;
  width: 3px; height: 28px;
  background: rgba(255,255,255,0.08);
}
.trash-1 { left: 30px; }
.trash-2 { right: 60px; }

/* Ordures qui dépassent */
.litter {
  position: absolute;
  bottom: 28px;
  width: 6px; height: 4px;
  background: #44382a;
  pointer-events: none;
}

/* Lanes (subtiles) */
.lane { display: none; }

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
  font-size: 16px;
  z-index: 100;
  text-shadow: 1px 1px 2px black, -1px -1px 2px black;
  font-weight: bold;
}

#hud-left, #hud-right { display: flex; gap: 20px; }
#score { color: #f0f0f0; }
#hi-score { color: #aaa; }
#lives { color: #ff5555; }
#powerup-status { color: #55ddff; }

/* Joueur */
.player {
  position: absolute;
  width: 30px;
  height: 30px;
  background: #d4a82a;
  border: 2px solid #f0f0f0;
  z-index: 10;
  transition: none;
}

.player.invincible {
  animation: blink 0.15s steps(2) infinite;
  border-color: #55ddff;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
}

.player.shield {
  box-shadow: 0 0 0 3px rgba(85, 221, 255, 0.6);
}

/* Ennemis */
.bat-enemy {
  position: absolute;
  width: 1px;
  height: 1px;
  transform: scale(1.2);
  -webkit-animation: 0.4s bat steps(1) infinite;
  animation: 0.4s bat steps(1) infinite;
  pointer-events: none;
}

/* Effet ralenti sur ennemis */
.slow-mode .bat-enemy,
.slow-mode .snake-enemy,
.slow-mode .spider-enemy {
  filter: hue-rotate(180deg) brightness(0.7);
}

/* Power-ups (items à collecter) */
.powerup {
  position: absolute;
  width: 28px; height: 28px;
  border: 2px solid #f0f0f0;
  z-index: 5;
  font-family: monospace;
  font-weight: bold;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pulse 0.6s ease-in-out infinite alternate;
}

@keyframes pulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.15); }
}

.powerup-life { background: #aa2233; color: #fff; }
.powerup-slow { background: #2244aa; color: #fff; }
.powerup-shield { background: #55aacc; color: #fff; }
.powerup-bomb { background: #cc5500; color: #fff; }

/* Effet bombe */
#bomb-flash {
  position: absolute;
  inset: 0;
  background: rgba(255, 200, 100, 0.6);
  pointer-events: none;
  z-index: 50;
  display: none;
}

/* Écrans */
#start-screen, #game-over-screen, #leaderboard-screen, #name-screen {
  position: absolute;
  inset: 0;
  background: rgba(10, 8, 6, 0.95);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 200;
  text-align: center;
  padding: 20px;
}

#start-screen h1, #game-over-screen h1, #leaderboard-screen h2, #name-screen h2 {
  font-size: 48px;
  margin-bottom: 10px;
  color: #f0f0f0;
  letter-spacing: 4px;
}

#start-screen .subtitle {
  font-size: 14px;
  color: #888;
  letter-spacing: 8px;
  margin-bottom: 25px;
}

#start-screen p, #game-over-screen p {
  font-size: 16px;
  margin: 6px 0;
  color: #bbb;
}

.controls-info {
  margin: 15px 0;
  padding: 12px 30px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.15);
  font-size: 14px;
}

.controls-info p { margin: 3px 0; }

.powerups-legend {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 15px 0;
}
.powerups-legend > div {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  padding: 4px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
}
.legend-icon {
  width: 18px; height: 18px;
  border: 1px solid #f0f0f0;
  display: inline-block;
  font-size: 12px;
  text-align: center;
  font-weight: bold;
  line-height: 18px;
}

.btn-action {
  margin-top: 20px;
  padding: 12px 36px;
  font-size: 16px;
  font-family: monospace;
  background: #d4a82a;
  color: #1a1a2e;
  border: none;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 2px;
}
.btn-action:hover { background: #e0b840; }
.btn-secondary {
  background: transparent;
  color: #aaa;
  border: 1px solid #555;
  margin-left: 10px;
}
.btn-secondary:hover { color: #fff; border-color: #aaa; }

#game-over-screen, #leaderboard-screen, #name-screen { display: none; }

#final-score {
  font-size: 36px;
  color: #f0f0f0;
  margin: 10px 0;
}

#name-input {
  font-family: monospace;
  font-size: 22px;
  padding: 10px 14px;
  background: #1a1410;
  border: 2px solid #555;
  color: #f0f0f0;
  text-align: center;
  letter-spacing: 4px;
  text-transform: uppercase;
  width: 200px;
  margin: 15px 0;
}
#name-input:focus { outline: none; border-color: #d4a82a; }

#leaderboard-list {
  font-size: 16px;
  margin: 20px 0;
  min-width: 280px;
  text-align: left;
}
.lb-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.lb-row.you { background: rgba(212, 168, 42, 0.15); color: #ffd866; }
.lb-rank { color: #888; width: 30px; }
.lb-name { flex: 1; padding: 0 10px; }
.lb-score { color: #aaa; font-weight: bold; }

.flash-message {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(85, 221, 255, 0.9);
  color: #000;
  padding: 8px 16px;
  font-weight: bold;
  font-size: 14px;
  pointer-events: none;
  z-index: 150;
  animation: flashOut 1.5s ease-out forwards;
}
@keyframes flashOut {
  0% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
}

<script>
// ============================================
// AUDIO (générés via Web Audio API, pas de fichiers)
// ============================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return audioCtx;
}

function playSound(type) {
  const ctx = getAudio();
  if (!ctx) return;
  const now = ctx.currentTime;
  
  if (type === 'death') {
    // Son grave descendant
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.6);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.6);
  } else if (type === 'pickup') {
    // Coin pickup
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.setValueAtTime(880, now + 0.05);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.15);
  } else if (type === 'hit') {
    // Coup encaissé
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.2);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'bomb') {
    // Boom
    const noise = ctx.createBufferSource();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    }
    noise.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    noise.connect(gain); gain.connect(ctx.destination);
    noise.start(now); noise.stop(now + 0.4);
  } else if (type === 'shield') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, now);
    osc.frequency.linearRampToValueAtTime(880, now + 0.3);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.3);
  } else if (type === 'slow') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.linearRampToValueAtTime(220, now + 0.4);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.4);
  } else if (type === 'spawn') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(80, now);
    gain.gain.setValueAtTime(0.05, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.1);
  }
}

// ============================================
// CONFIG
// ============================================
const GAME_W = 800;
const GAME_H = 500;
const PLAYER_SPEED = 4;

// ============================================
// ÉTAT
// ============================================
let player = { x: 50, y: 235, w: 30, h: 30 };
let enemies = [];
let powerups = [];
let keys = {};
let score = 0;
let lives = 1;
let hiScore = parseInt(localStorage.getItem('vermine_hiScore') || '0');
let leaderboard = JSON.parse(localStorage.getItem('vermine_leaderboard') || '[]');
let playerName = localStorage.getItem('vermine_name') || '';
let gameRunning = false;
let lastEnemySpawn = 0;
let lastPowerupSpawn = 0;
let spawnInterval = 1500;
let powerupInterval = 8000;
let gameStartTime = 0;

// Power-up actifs
let activePowerup = null; // 'slow' | 'shield' | null
let powerupEndTime = 0;

const playerEl = document.getElementById('player');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const hiScoreEl = document.getElementById('hi-score');
const powerupStatusEl = document.getElementById('powerup-status');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const leaderboardScreen = document.getElementById('leaderboard-screen');
const nameScreen = document.getElementById('name-screen');
const finalScoreEl = document.getElementById('final-score');
const finalMessageEl = document.getElementById('final-message');
const leaderboardListEl = document.getElementById('leaderboard-list');
const leaderboardListGoEl = document.getElementById('leaderboard-list-go');
const greetingEl = document.getElementById('player-greeting');
const bombFlash = document.getElementById('bomb-flash');
const gameArea = document.getElementById('game-area');

hiScoreEl.textContent = 'BEST ' + hiScore;

// ============================================
// PSEUDO
// ============================================
function showNameScreen() {
  startScreen.style.display = 'none';
  nameScreen.style.display = 'flex';
  document.getElementById('name-input').focus();
}

function checkPlayerName() {
  if (!playerName) {
    showNameScreen();
  } else {
    greetingEl.textContent = 'Salut ' + playerName + ' !';
  }
}
checkPlayerName();

document.getElementById('btn-name-ok').addEventListener('click', () => {
  let n = document.getElementById('name-input').value.trim().toUpperCase();
  if (!n) n = 'ANON';
  if (n.length > 8) n = n.substring(0, 8);
  playerName = n;
  localStorage.setItem('vermine_name', playerName);
  greetingEl.textContent = 'Salut ' + playerName + ' !';
  nameScreen.style.display = 'none';
  startScreen.style.display = 'flex';
});

document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btn-name-ok').click();
});

// ============================================
// CONTROLES
// ============================================
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
  keys[e.key] = false;
});

// ============================================
// SPAWN
// ============================================
function spawnEnemy() {
  const types = ['bat', 'snake', 'spider'];
  const type = types[Math.floor(Math.random() * types.length)];
  const fromLeft = Math.random() < 0.5;
  
  // Y aléatoire dans toute la zone jouable (pas juste 3 lanes fixes)
  // Marge pour que le sprite reste dans la zone visible
  const minY = 90;
  const maxY = 410;
  const y = minY + Math.random() * (maxY - minY);
  
  const elapsed = (Date.now() - gameStartTime) / 1000;
  let baseSpeed = 2.5 + Math.min(elapsed / 8, 4);
  if (activePowerup === 'slow') baseSpeed *= 0.4;
  const speed = baseSpeed + Math.random() * 1.5;
  
  let el, w, h;
  if (type === 'bat') {
    el = document.createElement('div');
    el.className = 'bat-enemy';
    w = 70; h = 70;
  } else if (type === 'snake') {
    el = document.createElement('div');
    el.className = 'snake-enemy';
    w = 64; h = 64;
  } else {
    el = document.createElement('div');
    el.className = 'spider-enemy';
    if (!fromLeft) el.classList.add('flipped');
    w = 64; h = 64;
  }
  
  const x = fromLeft ? -w : GAME_W;
  el.style.left = x + 'px';
  el.style.top = (y - h/2) + 'px';
  gameArea.appendChild(el);
  
  // Hitboxes par type (selon où se trouve réellement le sprite visible)
  let hitbox;
  if (type === 'bat') {
    // La chauve-souris est dessinée à partir du point d'origine, occupe environ 30-50px depuis left/top
    hitbox = { offsetX: 8, offsetY: 8, w: 50, h: 50 };
  } else if (type === 'snake') {
    // Le serpent dans son 64x64, le sprite occupe environ le centre 50x50
    hitbox = { offsetX: 10, offsetY: 12, w: 44, h: 48 };
  } else {
    // L'araignée occupe presque tout le 64x64
    hitbox = { offsetX: 6, offsetY: 14, w: 52, h: 40 };
  }
  enemies.push({
    el, x, y: y - h/2, w, h,
    vx: fromLeft ? speed : -speed,
    type,
    baseSpeed: fromLeft ? speed : -speed,
    hitbox
  });
}

function spawnPowerup() {
  const types = ['life', 'slow', 'shield', 'bomb'];
  const type = types[Math.floor(Math.random() * types.length)];
  
  const x = 80 + Math.random() * (GAME_W - 160);
  const y = 60 + Math.random() * (GAME_H - 130);
  
  const el = document.createElement('div');
  el.className = 'powerup powerup-' + type;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  
  const symbols = { life: '+', slow: '~', shield: 'O', bomb: '*' };
  el.textContent = symbols[type];
  
  gameArea.appendChild(el);
  powerups.push({
    el, x, y, w: 28, h: 28, type,
    spawnTime: Date.now()
  });
}

// ============================================
// COLLISIONS
// ============================================
function checkCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================
// POWER-UPS
// ============================================
function applyPowerup(type) {
  playSound('pickup');
  if (type === 'life') {
    lives++;
    showFlash('+1 VIE', '#aa2233');
    playerEl.classList.add('shield');
    setTimeout(() => { if (!activePowerup === 'shield') playerEl.classList.remove('shield'); }, 100);
  } else if (type === 'slow') {
    playSound('slow');
    activePowerup = 'slow';
    powerupEndTime = Date.now() + 5000;
    showFlash('RALENTI 5s', '#2244aa');
    gameArea.classList.add('slow-mode');
    enemies.forEach(e => { e.vx = e.baseSpeed * 0.4; });
  } else if (type === 'shield') {
    playSound('shield');
    activePowerup = 'shield';
    powerupEndTime = Date.now() + 3000;
    showFlash('INVINCIBLE 3s', '#55aacc');
    playerEl.classList.add('invincible');
    playerEl.classList.add('shield');
  } else if (type === 'bomb') {
    playSound('bomb');
    bombFlash.style.display = 'block';
    setTimeout(() => { bombFlash.style.display = 'none'; }, 200);
    enemies.forEach(e => e.el.remove());
    enemies = [];
    showFlash('BOMBE !', '#cc5500');
  }
}

function clearPowerup() {
  if (activePowerup === 'slow') {
    gameArea.classList.remove('slow-mode');
    enemies.forEach(e => { e.vx = e.baseSpeed; });
  } else if (activePowerup === 'shield') {
    playerEl.classList.remove('invincible');
    playerEl.classList.remove('shield');
  }
  activePowerup = null;
  powerupStatusEl.textContent = '';
}

function showFlash(text, color) {
  const flash = document.createElement('div');
  flash.className = 'flash-message';
  flash.textContent = text;
  flash.style.background = color;
  flash.style.color = '#fff';
  gameArea.appendChild(flash);
  setTimeout(() => flash.remove(), 1500);
}

// ============================================
// GAME LOOP
// ============================================
function update() {
  if (!gameRunning) return;
  
  const elapsed = (Date.now() - gameStartTime) / 1000;
  score = Math.floor(elapsed * 10);
  scoreEl.textContent = 'SCORE ' + score;
  livesEl.textContent = 'VIE x' + lives;
  
  // Check fin power-up
  if (activePowerup && Date.now() > powerupEndTime) {
    clearPowerup();
  }
  
  if (activePowerup) {
    const remaining = Math.max(0, (powerupEndTime - Date.now()) / 1000);
    const labels = { slow: 'RALENTI', shield: 'BOUCLIER' };
    powerupStatusEl.textContent = labels[activePowerup] + ' ' + remaining.toFixed(1) + 's';
  }
  
  // Spawn ennemis
  spawnInterval = Math.max(400, 1500 - elapsed * 30);
  if (Date.now() - lastEnemySpawn > spawnInterval) {
    spawnEnemy();
    lastEnemySpawn = Date.now();
  }
  
  // Spawn power-ups (toutes les 8s + un peu d'aléa)
  if (Date.now() - lastPowerupSpawn > powerupInterval && powerups.length < 3) {
    spawnPowerup();
    lastPowerupSpawn = Date.now();
    powerupInterval = 6000 + Math.random() * 6000;
  }
  
  // Joueur
  if (keys['ArrowLeft'] || keys['a'] || keys['q']) player.x -= PLAYER_SPEED;
  if (keys['ArrowRight'] || keys['d']) player.x += PLAYER_SPEED;
  if (keys['ArrowUp'] || keys['w'] || keys['z']) player.y -= PLAYER_SPEED;
  if (keys['ArrowDown'] || keys['s']) player.y += PLAYER_SPEED;
  
  player.x = Math.max(0, Math.min(GAME_W - player.w, player.x));
  // Le joueur est confiné à la zone des 3 lanes (y=50 à y=450)
  // pour éviter qu'il s'échappe hors de portée des ennemis
  player.y = Math.max(55, Math.min(445 - player.h, player.y));
  
  playerEl.style.left = player.x + 'px';
  playerEl.style.top = player.y + 'px';
  
  // Ennemis
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.x += e.vx;
    e.el.style.left = e.x + 'px';
    
    if (e.x < -e.w - 20 || e.x > GAME_W + 20) {
      e.el.remove();
      enemies.splice(i, 1);
      continue;
    }
    
    if (activePowerup === 'shield') continue;
    
    const enemyBox = {
      x: e.x + e.hitbox.offsetX, y: e.y + e.hitbox.offsetY,
      w: e.hitbox.w, h: e.hitbox.h
    };
    if (checkCollision(player, enemyBox)) {
      e.el.remove();
      enemies.splice(i, 1);
      lives--;
      if (lives <= 0) {
        gameOver();
        return;
      } else {
        playSound('hit');
        showFlash('-1 VIE', '#aa2233');
        // Petit bouclier d'invincibilité 1s
        playerEl.classList.add('invincible');
        const oldPowerup = activePowerup;
        activePowerup = 'shield';
        powerupEndTime = Date.now() + 1000;
        setTimeout(() => {
          if (activePowerup === 'shield' && Date.now() >= powerupEndTime) {
            playerEl.classList.remove('invincible');
            activePowerup = oldPowerup;
          }
        }, 1000);
      }
    }
  }
  
  // Power-ups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    
    // Disparaissent après 6 secondes
    if (Date.now() - p.spawnTime > 6000) {
      p.el.remove();
      powerups.splice(i, 1);
      continue;
    }
    
    // Clignotent quand sur le point de disparaître
    if (Date.now() - p.spawnTime > 4000) {
      p.el.style.opacity = (Math.sin(Date.now() / 100) + 1) / 2;
    }
    
    if (checkCollision(player, p)) {
      applyPowerup(p.type);
      p.el.remove();
      powerups.splice(i, 1);
    }
  }
}

// ============================================
// LEADERBOARD
// ============================================
function saveScore(name, score) {
  leaderboard.push({ name, score, date: Date.now() });
  leaderboard.sort((a, b) => b.score - a.score);
  leaderboard = leaderboard.slice(0, 5);
  localStorage.setItem('vermine_leaderboard', JSON.stringify(leaderboard));
}

function renderLeaderboard(targetEl, highlightLast = false) {
  if (leaderboard.length === 0) {
    targetEl.innerHTML = '<p style="color: #777; text-align: center; padding: 20px;">Aucun score pour le moment</p>';
    return;
  }
  let html = '';
  leaderboard.forEach((entry, i) => {
    const isYou = highlightLast && i === leaderboard.findIndex(e => e.name === playerName && e.score === score);
    html += '<div class="lb-row' + (isYou ? ' you' : '') + '">' +
      '<span class="lb-rank">#' + (i+1) + '</span>' +
      '<span class="lb-name">' + entry.name + '</span>' +
      '<span class="lb-score">' + entry.score + '</span>' +
      '</div>';
  });
  targetEl.innerHTML = html;
}

// ============================================
// GAME OVER
// ============================================
function gameOver() {
  gameRunning = false;
  playSound('death');
  clearPowerup();
  finalScoreEl.textContent = score;
  
  let msg = 'Faut s\'entraîner...';
  if (score > 100) msg = 'Pas mal !';
  if (score > 300) msg = 'Bien joué !';
  if (score > 600) msg = 'Excellent !';
  if (score > 1000) msg = 'LEGENDAIRE';
  
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('vermine_hiScore', hiScore.toString());
    hiScoreEl.textContent = 'BEST ' + hiScore;
    msg = 'NOUVEAU RECORD';
  }
  
  finalMessageEl.textContent = msg;
  
  // Sauvegarder le score
  saveScore(playerName, score);
  renderLeaderboard(leaderboardListGoEl, true);
  
  gameOverScreen.style.display = 'flex';
}

// ============================================
// START / RESTART
// ============================================
function startGame() {
  // Init audio (besoin d'une interaction user)
  getAudio();
  
  enemies.forEach(e => e.el.remove());
  enemies = [];
  powerups.forEach(p => p.el.remove());
  powerups = [];
  player.x = 50;
  player.y = 235;
  score = 0;
  lives = 1;
  lastEnemySpawn = Date.now();
  lastPowerupSpawn = Date.now();
  gameStartTime = Date.now();
  spawnInterval = 1500;
  powerupInterval = 8000;
  clearPowerup();
  playerEl.classList.remove('invincible');
  playerEl.classList.remove('shield');
  
  startScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
  leaderboardScreen.style.display = 'none';
  
  gameRunning = true;
}

function showMenu() {
  gameOverScreen.style.display = 'none';
  leaderboardScreen.style.display = 'none';
  startScreen.style.display = 'flex';
}

function showLeaderboard() {
  startScreen.style.display = 'none';
  renderLeaderboard(leaderboardListEl);
  leaderboardScreen.style.display = 'flex';
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-retry').addEventListener('click', startGame);
document.getElementById('btn-menu').addEventListener('click', showMenu);
document.getElementById('btn-leaderboard').addEventListener('click', showLeaderboard);
document.getElementById('btn-back').addEventListener('click', showMenu);

// Enter pour rejouer
window.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !gameRunning && gameOverScreen.style.display === 'flex') {
    startGame();
  }
});

// ============================================
// MAIN LOOP
// ============================================
function loop() {
  update();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
